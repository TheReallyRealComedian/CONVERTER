services:
  # 1. Redis - Job Queue Database (internal only, no port exposed)
  redis:
    image: redis:alpine
    container_name: file-transformer-redis
    restart: unless-stopped

  # 2. Web Container (Flask API)
  markdown-converter:
    build: .
    container_name: markdown-converter-web
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5656:5000"
    volumes:
      - ./google-credentials.json:/app/google-credentials.json
      # Shared volume for podcast files
      - podcast_data:/app/output_podcasts
      # Persistent database storage
      - app_data:/app/data
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - NOTION_MCP_URL=http://notion-mcp-server:3333
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - NOTION_TOKEN=${NOTION_TOKEN}
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - default
      - notion-mcp-net
    restart: unless-stopped

  # 3. Worker Container (Background Job Processor)
  worker:
    build: .
    container_name: markdown-converter-worker
    command: python worker.py
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Shared volume for podcast files
      - podcast_data:/app/output_podcasts
      - ./google-credentials.json:/app/google-credentials.json
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

# Named volume for sharing podcast files between web and worker
volumes:
  podcast_data:
  app_data:

networks:
  notion-mcp-net:
    external: true
