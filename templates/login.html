<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - File Transformer</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        (function() {
            var saved = localStorage.getItem('globalTheme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            if (theme === 'light') document.documentElement.setAttribute('data-global-theme', 'light');
        })();
    </script>
</head>
<body class="min-h-screen flex items-center justify-center font-sans">
    <button type="button" id="theme-toggle" class="theme-toggle-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
        <svg id="theme-icon-sun" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="theme-icon-moon" class="theme-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div class="w-full max-w-sm px-4">
        <div class="glass p-8">
            <h2 class="text-center text-xl font-bold text-white/95 mb-1">File Transformer</h2>
            <p class="text-center text-sm text-white/60 mb-6">Sign in to continue</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="glass-alert
                            {% if category == 'danger' %}glass-alert-danger
                            {% elif category == 'success' %}glass-alert-success
                            {% elif category == 'warning' %}glass-alert-warning
                            {% else %}glass-alert-info{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-white/80 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="glass-input w-full">
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-white/80 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                        class="glass-input w-full">
                </div>
                <button type="submit" class="glass-btn glass-btn--primary w-full text-center">
                    Sign In
                </button>
            </form>
        </div>
    </div>
    <script>
        (function() {
            var btn = document.getElementById('theme-toggle');
            var sunIcon = document.getElementById('theme-icon-sun');
            var moonIcon = document.getElementById('theme-icon-moon');
            function isLight() { return document.documentElement.getAttribute('data-global-theme') === 'light'; }
            function updateIcons() {
                if (isLight()) { sunIcon.classList.add('hidden'); moonIcon.classList.remove('hidden'); }
                else { sunIcon.classList.remove('hidden'); moonIcon.classList.add('hidden'); }
            }
            function setTheme(light) {
                document.documentElement.classList.add('theme-transitioning');
                if (light) document.documentElement.setAttribute('data-global-theme', 'light');
                else document.documentElement.removeAttribute('data-global-theme');
                localStorage.setItem('globalTheme', light ? 'light' : 'dark');
                updateIcons();
                setTimeout(function() { document.documentElement.classList.remove('theme-transitioning'); }, 350);
            }
            updateIcons();
            btn?.addEventListener('click', function() { setTheme(!isLight()); });
        })();
    </script>
</body>
</html>
