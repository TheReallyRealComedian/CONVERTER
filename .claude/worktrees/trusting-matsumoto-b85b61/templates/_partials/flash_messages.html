{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="c-alert
                {% if category == 'danger' %}c-alert--danger
                {% elif category == 'success' %}c-alert--success
                {% elif category == 'warning' %}c-alert--warning
                {% else %}c-alert--info{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
